<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jeu XO Pro</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
    transition:0.3s;
}

h1{
    margin-top:20px;
}

#menu{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111827;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#menu h1{
    font-size:50px;
    margin-bottom:30px;
}

#info{
    font-size:20px;
    margin-top:10px;
}

#score{
    margin-top:10px;
    font-size:18px;
}

#timer{
    margin-top:10px;
    font-size:20px;
    color:#ffeaa7;
}

#jeu{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

.case{
    width:100px;
    height:100px;
    background:#2c2c3e;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    transition:0.2s;
}

.case:hover{
    background:#3b3b55;
}

.gagnant{
    background:#00b894 !important;
    animation:flash 0.5s infinite alternate;
}

@keyframes flash{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

#message{
    margin-top:20px;
    font-size:22px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    cursor:pointer;
    font-size:16px;
    margin-left:5px;
}

button:hover{
    opacity:0.9;
}

#modeBtn{
    background:#0984e3;
}

select{
    padding:10px;
    border-radius:10px;
    font-size:16px;
}

.light{
    background:#f1f1f1;
    color:black;
}

.light .case{
    background:#dfe6e9;
    color:black;
}

.light .case:hover{
    background:#b2bec3;
}

</style>
</head>

<body>

<!-- MENU -->

<div id="menu">

    <h1>XO GAME PRO</h1>

    <button onclick="startGame()">
        Jouer
    </button>

    <button onclick="toggleTheme()">
        Mode Clair / Sombre
    </button>

    <br><br>

    <select id="difficulty">
        <option value="easy">IA Facile</option>
        <option value="medium">IA Moyenne</option>
        <option value="hard">IA Difficile</option>
    </select>

</div>

<h1>Jeu XO Pro</h1>

<div id="info">Mode : Joueur vs Ordinateur</div>

<div id="score">X : 0 | O : 0</div>

<div id="timer">Temps : 10</div>

<div id="jeu"></div>

<div id="message">Tour : X</div>

<button onclick="reset()">Restart</button>

<button id="modeBtn" onclick="changerMode()">
Changer Mode
</button>

<script>

let grille = ["","","","","","","","",""];

let actif = true;

let joueurActuel = "X";

let scoreX = 0;
let scoreO = 0;

let modeIA = true;

let difficulty = "easy";

let temps = 10;

let interval;

const combinaisons = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

let jeu = document.getElementById("jeu");

// création des cases
for(let i=0;i<9;i++){

    let div = document.createElement("div");

    div.classList.add("case");

    div.dataset.index = i;

    div.onclick = jouer;

    jeu.appendChild(div);
}

function startGame(){

    document.getElementById("menu").style.display = "none";

    difficulty =
    document.getElementById("difficulty").value;

    lancerTimer();
}

function toggleTheme(){

    document.body.classList.toggle("light");
}

function lancerTimer(){

    clearInterval(interval);

    temps = 10;

    document.getElementById("timer")
    .innerText = "Temps : " + temps;

    interval = setInterval(()=>{

        temps--;

        document.getElementById("timer")
        .innerText = "Temps : " + temps;

        if(temps <= 0){

            joueurActuel =
            joueurActuel === "X" ? "O" : "X";

            document.getElementById("message")
            .innerText =
            "Temps écoulé ! Tour : " + joueurActuel;

            temps = 10;
        }

    },1000);
}

function jouer(e){

    let i = e.target.dataset.index;

    if(grille[i] !== "" || !actif) return;

    faireCoup(i, joueurActuel);

    // mode ordinateur
    if(modeIA){

        if(actif && joueurActuel === "O"){

            setTimeout(ordinateur,400);
        }
    }
}

function faireCoup(i, symbole){

    grille[i] = symbole;

    document.querySelectorAll(".case")[i]
    .innerText = symbole;

    if(checkWin(symbole)){

        actif = false;

        clearInterval(interval);

        if(symbole === "X"){
            scoreX++;
        }else{
            scoreO++;
        }

        updateScore();

        document.getElementById("message")
        .innerText = symbole + " gagne !";

        return;
    }

    if(!grille.includes("")){

        actif = false;

        clearInterval(interval);

        document.getElementById("message")
        .innerText = "Match nul !";

        return;
    }

    joueurActuel = (symbole === "X") ? "O" : "X";

    document.getElementById("message")
    .innerText = "Tour : " + joueurActuel;

    lancerTimer();
}

function ordinateur(){

    if(!actif) return;

    let move = bestMove();

    faireCoup(move,"O");
}

function bestMove(){

    let vides = [];

    for(let i=0;i<9;i++){

        if(grille[i] === ""){
            vides.push(i);
        }
    }

    // IA facile
    if(difficulty === "easy"){

        return vides[
            Math.floor(Math.random()*vides.length)
        ];
    }

    // IA moyenne
    if(difficulty === "medium"){

        if(Math.random() < 0.5){

            for(let i=0;i<9;i++){

                if(grille[i] === ""){

                    grille[i] = "O";

                    if(checkSimpleWin("O")){

                        grille[i] = "";

                        return i;
                    }

                    grille[i] = "";
                }
            }
        }

        return vides[
            Math.floor(Math.random()*vides.length)
        ];
    }

    // IA difficile

    // gagner
    for(let i=0;i<9;i++){

        if(grille[i] === ""){

            grille[i] = "O";

            if(checkSimpleWin("O")){

                grille[i] = "";

                return i;
            }

            grille[i] = "";
        }
    }

    // bloquer
    for(let i=0;i<9;i++){

        if(grille[i] === ""){

            grille[i] = "X";

            if(checkSimpleWin("X")){

                grille[i] = "";

                return i;
            }

            grille[i] = "";
        }
    }

    // centre
    if(grille[4] === "") return 4;

    return vides[
        Math.floor(Math.random()*vides.length)
    ];
}

function checkWin(s){

    for(let c of combinaisons){

        if(
            grille[c[0]] === s &&
            grille[c[1]] === s &&
            grille[c[2]] === s
        ){

            document.querySelectorAll(".case")[c[0]]
            .classList.add("gagnant");

            document.querySelectorAll(".case")[c[1]]
            .classList.add("gagnant");

            document.querySelectorAll(".case")[c[2]]
            .classList.add("gagnant");

            return true;
        }
    }

    return false;
}

// vérifie victoire simple
function checkSimpleWin(s){

    return combinaisons.some(c => {

        return grille[c[0]] === s &&
               grille[c[1]] === s &&
               grille[c[2]] === s;
    });
}

function updateScore(){

    document.getElementById("score")
    .innerText = "X : " + scoreX + " | O : " + scoreO;
}

function changerMode(){

    modeIA = !modeIA;

    if(modeIA){

        document.getElementById("info")
        .innerText = "Mode : Joueur vs Ordinateur";

    }else{

        document.getElementById("info")
        .innerText = "Mode : Joueur vs Joueur";
    }

    reset();
}

function reset(){

    grille = ["","","","","","","","",""];

    actif = true;

    joueurActuel = "X";

    clearInterval(interval);

    lancerTimer();

    document.querySelectorAll(".case")
    .forEach(c => {

        c.innerText = "";

        c.classList.remove("gagnant");
    });

    document.getElementById("message")
    .innerText = "Tour : X";
}

</script>

</body>
</html>
