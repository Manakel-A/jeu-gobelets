<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu des Gobelets</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
}

.zone{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:80px;
}

.gobelet{
    width:90px;
    height:130px;
    background:#b5651d;
    border-radius:0 0 25px 25px;
    cursor:pointer;
    transition:0.3s;
}

.gobelet:hover{
    transform:translateY(-10px);
}

button{
    margin-top:50px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#message{
    margin-top:30px;
    font-size:24px;
}
</style>
</head>

<body>

<h1>🎮 Jeu des 3 Gobelets</h1>
<p>Trouve la balle cachée !</p>

<div class="zone">
    <div class="gobelet" onclick="choisir(0)"></div>
    <div class="gobelet" onclick="choisir(1)"></div>
    <div class="gobelet" onclick="choisir(2)"></div>
</div>

<button onclick="debut()">Mélanger</button>

<div id="message"></div>

<script>

let balle = 0;
let bloque = true;

function debut(){
    let g = document.querySelectorAll(".gobelet");

    balle = Math.floor(Math.random() * 3);

    g[balle].style.background = "red";

    document.getElementById("message").innerText = "👀 Regarde bien !";

    bloque = true;

    setTimeout(() => {
        melanger();
    }, 6000);
}

function melanger(){

    let g = document.querySelectorAll(".gobelet");

    for(let i = 0; i < 3; i++){
        g[i].style.background = "#b5651d";
    }

    balle = Math.floor(Math.random() * 3);

    document.getElementById("message").innerText = "🤔 À toi de jouer !";

    bloque = false;
}

function choisir(numero){

    if(bloque) return;

    if(numero === balle){
        document.getElementById("message").innerText = "🎉 Bravo !";
    } else {
        document.getElementById("message").innerText = "❌ Perdu !";
    }
}

debut();

</script>

</body>
</html>
