//mon jeu xo
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu XO</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

#info{
    font-size:20px;
    margin-top:10px;
}

#score{
    margin-top:10px;
    font-size:18px;
}

#jeu{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

.case{
    width:100px;
    height:100px;
    background:#2c2c3e;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
}

.case:hover{
    background:#3b3b55;
}

#message{
    margin-top:20px;
    font-size:22px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>Jeu XO Pro</h1>

<div id="info">Mode : Joueur vs Ordinateur</div>

<div id="score">X : 0 | O : 0</div>

<div id="jeu"></div>

<div id="message"></div>

<button onclick="reset()">Restart</button>

<script>

let grille = ["","","","","","","","",""];

let actif = true;

let joueurActuel = "X";

let scoreX = 0;
let scoreO = 0;

const combinaisons = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

let jeu = document.getElementById("jeu");

// création cases
for(let i=0;i<9;i++){

    let div = document.createElement("div");

    div.classList.add("case");

    div.dataset.index = i;

    div.onclick = jouer;

    jeu.appendChild(div);
}

function jouer(e){

    let i = e.target.dataset.index;

    if(grille[i] !== "" || !actif) return;

    faireCoup(i, "X");

    if(actif) setTimeout(ordinateur, 400);
}

function faireCoup(i, symbole){

    grille[i] = symbole;

    document.querySelectorAll(".case")[i].innerText = symbole;

    if(checkWin(symbole)){

        actif = false;

        if(symbole === "X") scoreX++;
        else scoreO++;

        updateScore();

        document.getElementById("message")
        .innerText = symbole + " gagne !";

        return;
    }

    if(!grille.includes("")){

        actif = false;

        document.getElementById("message")
        .innerText = "Match nul !";

        return;
    }

    joueurActuel = (symbole === "X") ? "O" : "X";
}

function ordinateur(){

    if(!actif) return;

    // IA simple intelligente
    let move = bestMove();

    faireCoup(move, "O");
}

function bestMove(){

    // 1. gagner si possible
    for(let i=0;i<9;i++){
        if(grille[i] === ""){
            grille[i] = "O";
            if(checkWin("O")){
                grille[i] = "";
                return i;
            }
            grille[i] = "";
        }
    }

    // 2. bloquer X
    for(let i=0;i<9;i++){
        if(grille[i] === ""){
            grille[i] = "X";
            if(checkWin("X")){
                grille[i] = "";
                return i;
            }
            grille[i] = "";
        }
    }

    // 3. aléatoire
    let vides = [];
    for(let i=0;i<9;i++){
        if(grille[i] === "") vides.push(i);
    }

    return vides[Math.floor(Math.random()*vides.length)];
}

function checkWin(s){

    return combinaisons.some(c=>{
        return grille[c[0]]===s &&
               grille[c[1]]===s &&
               grille[c[2]]===s;
    });
}

function updateScore(){

    document.getElementById("score")
    .innerText = "X : " + scoreX + " | O : " + scoreO;
}

function reset(){

    grille = ["","","","","","","","",""];
    actif = true;
    joueurActuel = "X";

    document.querySelectorAll(".case")
    .forEach(c => c.innerText = "");

    document.getElementById("message").innerText = "";
}

</script>

</body>
</html>
