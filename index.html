<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu XO</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
}

#jeu{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
    margin-top:50px;
}

.case{
    width:100px;
    height:100px;
    background:#2c2c3e;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    transition:0.3s;
}

.case:hover{
    background:#3b3b55;
}

#message{
    margin-top:30px;
    font-size:24px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>

<body>

<h1>Jeu XO</h1>

<div id="jeu"></div>

<div id="message"></div>

<button onclick="reset()">Nouvelle Partie</button>

<script>
let grille = ["","","","","","","","",""];

let actif = true;

let mode = prompt(
"Choisis un mode :\n1 = Joueur vs Joueur\n2 = Joueur vs Ordinateur"
);

// symboles
let symboleJoueur1 = "X";
let symboleJoueur2 = "O";

let joueurActuel = "X";

// combinaisons gagnantes
const combinaisons = [

    [0,1,2],
    [3,4,5],
    [6,7,8],

    [0,3,6],
    [1,4,7],
    [2,5,8],

    [0,4,8],
    [2,4,6]
];

// créer les cases
let jeu = document.getElementById("jeu");

for(let i = 0; i < 9; i++){

    let div = document.createElement("div");

    div.classList.add("case");

    div.setAttribute("data-index", i);

    div.addEventListener("click", jouer);

    jeu.appendChild(div);
}

document.getElementById("message").innerText =
"Joueur " + joueurActuel + " commence";

function jouer(e){

    let index = e.target.getAttribute("data-index");

    // empêcher de rejouer sur la même case
    if(grille[index] !== "" || !actif){

        return;
    }

    faireCoup(index, joueurActuel);

    // mode ordinateur
    if(
        mode == "2" &&
        joueurActuel === symboleJoueur2 &&
        actif
    ){

        setTimeout(ordinateur, 500);
    }
}

function faireCoup(index, symbole){

    grille[index] = symbole;

    document.querySelectorAll(".case")[index]
    .innerText = symbole;

    // victoire
    if(checkWin(symbole)){

        document.getElementById("message").innerText =
        "🎉 Joueur " + symbole + " gagne !";

        actif = false;

        return;
    }

    // match nul
    if(!grille.includes("")){

        document.getElementById("message").innerText =
        "🤝 Match nul !";

        actif = false;

        return;
    }

    // changer joueur
    joueurActuel = symbole === "X" ? "O" : "X";

    document.getElementById("message").innerText =
    "Joueur " + joueurActuel + " joue";
}

function ordinateur(){

    let casesVides = [];

    for(let i = 0; i < grille.length; i++){

        if(grille[i] === ""){

            casesVides.push(i);
        }
    }

    let choix =
    casesVides[Math.floor(Math.random() * casesVides.length)];

    faireCoup(choix, symboleJoueur2);
}

function checkWin(symbole){

    return combinaisons.some(c => {

        return grille[c[0]] === symbole &&
               grille[c[1]] === symbole &&
               grille[c[2]] === symbole;
    });
}

function reset(){

    grille = ["","","","","","","","",""];

    actif = true;

    // échange des symboles
    [symboleJoueur1, symboleJoueur2] =
    [symboleJoueur2, symboleJoueur1];

    // X commence toujours
    joueurActuel = "X";

    document.querySelectorAll(".case")
    .forEach(c => c.innerText = "");

    document.getElementById("message").innerText =
    "Nouvelle partie ! Joueur " + joueurActuel + " commence";

    // si l'ordinateur possède X
    if(mode == "2" && symboleJoueur2 === "X"){

        setTimeout(ordinateur, 500);
    }
}
</script>

</body>
</html>
