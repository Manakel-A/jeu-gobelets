<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jeu des Gobelets</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

/* titre */
h1{
    margin-top:30px;
}

/* zone des gobelets */
.zone{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:80px;
}

/* un gobelet */
.gobelet{
    width:90px;
    height:130px;
    background:#b5651d;
    border-radius:0 0 25px 25px;

    cursor:pointer;

    transition:0.3s;
}

/* effet quand souris passe dessus */
.gobelet:hover{
    transform:translateY(-10px);
}

/* bouton */
button{
    margin-top:50px;

    padding:12px 25px;

    border:none;
    border-radius:10px;

    background:#00b894;
    color:white;

    font-size:18px;

    cursor:pointer;
}

/* message */
#message{
    margin-top:30px;
    font-size:24px;
}

</style>
</head>

<body>

<h1>🎮 Jeu des 3 Gobelets</h1>

<p>Trouve la balle cachée !</p>

<!-- les 3 gobelets -->
<div class="zone">

    <div class="gobelet" onclick="choisir(0)"></div>

    <div class="gobelet" onclick="choisir(1)"></div>

    <div class="gobelet" onclick="choisir(2)"></div>

</div>

<!-- bouton melanger -->
<button onclick="melanger()">
    Mélanger
</button>

<!-- message -->
<div id="message"></div>

<script>

/* position de la balle */
let balle = 0;

/* fonction melanger */
function melanger(){

    /* nombre aleatoire 0 1 ou 2 */
    balle = Math.floor(Math.random() * 3);

    /* message */
    document.getElementById("message").innerText =
    "🤔 Où est la balle ?";
}

/* quand joueur clique */
function choisir(numero){

    /* si trouvé */
    if(numero === balle){

        document.getElementById("message").innerText =
        "🎉 Bravo tu as gagné !";

    }

    /* sinon */
    else{

        document.getElementById("message").innerText =
        "❌ Raté !";

    }

}

/* lancer le jeu au debut */
melanger();

</script>

</body>
</html>
